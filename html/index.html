<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Bibliothèque Steam</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <form method="GET" action="/">
            <label for="iduser">Steam ID :</label>
            <input id="iduser" name="iduser" type="text" placeholder="Entrez un SteamID64" required>
            <button type="submit">Rechercher</button>
        </form>
        <h1>🎮 Ma Collection Steam</h1>
    </header>

    <main class="game-container">
        {{range .}}
        <div class="game-card">
            <div class="game-info">
                <h2>{{.Name}}</h2>
                <p class="id">AppID: {{.AppID}}</p>
                <div class="stats">
                    <span><strong>Total:</strong> {{.PlaytimeForever}} min</span>
                    {{if .Playtime2Weeks}}
                    <span><strong>Récent:</strong> {{.Playtime2Weeks}} min</span>
                    {{end}}
                </div>
            </div>
        </div>
        {{else}}
        <p>Aucun jeu trouvé. Vérifiez votre SteamID ou votre clé API.</p>
        {{end}}
    </main>
</body>
</html>
