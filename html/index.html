<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Steam Explorer</title>
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <header>
            <h1>🎮 Steam Collector</h1>
            <div class="search-box">
                <form method="GET" action="/">
                    <input
                        type="text"
                        name="iduser"
                        placeholder="SteamID64..."
                        value="{{.SteamID}}"
                    />
                    <button type="submit">Rechercher</button>
                </form>
            </div>

            <div class="crud-buttons">
                <button id="btn-sync" onclick="sync()">💾 Synchroniser</button>
                <button id="btn-top" onclick="showTop()">📊 Voir le Top</button>
                <button id="btn-delete" onclick="remove()">🗑️ Supprimer</button>
            </div>
            <div id="status-msg" style="margin-top: 15px"></div>
            <div id="top-table-container"></div>
        </header>

        <main class="game-container">
            {{range .Games}}
            <div class="game-card">
                <img
                    class="game-banner"
                    src="https://cdn.akamai.steamstatic.com/steam/apps/{{.AppID}}/header.jpg"
                />
                <div class="game-info">
                    <h2>{{.Name}}</h2>
                    <p class="playtime">{{.PlaytimeForever}} min</p>
                </div>
            </div>
            {{end}}
        </main>

        <script>
            const steamID = "{{.SteamID}}";
            const msg = document.getElementById("status-msg");

            function sync() {
                msg.innerText = "⏳ Synchronisation...";
                fetch(`/sync?iduser=${steamID}`)
                    .then((r) => r.json())
                    .then((d) => (msg.innerText = "✅ " + d.message))
                    .catch(() => (msg.innerText = "❌ Erreur"));
            }

            function showTop() {
                fetch(`/top?iduser=${steamID}`)
                    .then((r) => r.json())
                    .then((data) => {
                        let html = `<table class="top-table">`;
                        [
                            data.Game1,
                            data.Game2,
                            data.Game3,
                            data.Game4,
                            data.Game5,
                        ].forEach((g, i) => {
                            if (g)
                                html += `<tr><td>#${i + 1}</td><td>${g}</td></tr>`;
                        });
                        document.getElementById(
                            "top-table-container",
                        ).innerHTML = html + "</table>";
                    });
            }

            function remove() {
                if (!confirm("Supprimer vos données ?")) return;
                fetch(`/delete?iduser=${steamID}`)
                    .then((r) => r.json())
                    .then((d) => {
                        alert(d.message);
                        document.getElementById(
                            "top-table-container",
                        ).innerHTML = "";
                    });
            }
        </script>
    </body>
</html>
